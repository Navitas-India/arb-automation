name: ARB Automation — Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate specs from user stories
        run: npm run generate
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}

      - name: Run API tests
        run: npm run test:api
        env:
          BACKEND_URL:                   ${{ secrets.BACKEND_URL }}
          TEST_ADMIN_EMAIL:              ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD:           ${{ secrets.TEST_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY:  ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}

      - name: Run UI tests
        run: npm run test:ui
        env:
          FRONTEND_URL:                  ${{ secrets.FRONTEND_URL }}
          BACKEND_URL:                   ${{ secrets.BACKEND_URL }}
          TEST_ADMIN_EMAIL:              ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD:           ${{ secrets.TEST_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY:  ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-json
          path: test-results/results.json
          retention-days: 30

  pr-summary:
    name: Post Test Summary on PR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JSON results
        uses: actions/download-artifact@v4
        with:
          name: test-results-json
          path: test-results/
        continue-on-error: true

      - name: Post PR comment with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🎭 Playwright Test Results\n\n';

            try {
              const raw = fs.readFileSync('test-results/results.json', 'utf8');
              const results = JSON.parse(raw);

              const passed  = results.suites?.flatMap(s => s.specs).filter(s => s.ok).length  || 0;
              const failed  = results.suites?.flatMap(s => s.specs).filter(s => !s.ok).length || 0;
              const total   = passed + failed;

              summary += `| Result | Count |\n|--------|-------|\n`;
              summary += `| ✅ Passed | ${passed} |\n`;
              summary += `| ❌ Failed | ${failed} |\n`;
              summary += `| 📊 Total  | ${total} |\n\n`;

              if (failed > 0) {
                summary += `### ❌ Failed Tests\n\n`;
                results.suites?.forEach(suite => {
                  suite.specs?.filter(s => !s.ok).forEach(spec => {
                    summary += `- **${suite.title}** › ${spec.title}\n`;
                  });
                });
              } else {
                summary += `### ✅ All tests passed!\n`;
              }
            } catch (e) {
              summary += `_Could not parse test results. Check the Actions tab for details._\n`;
            }

            summary += `\n[📄 View Full Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         summary,
            });

  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results
        continue-on-error: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report:  allure-report
          allure_history: allure-history
          keep_reports:   20

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token:  ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir:   allure-report
